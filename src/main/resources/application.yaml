spring:
  application:
    name: server

  datasource:
    url: jdbc:h2:file:./vocabdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  web:
    error:
      include-message: always

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000